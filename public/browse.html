<!DOCTYPE html>
<html>
<head>
  <title>Browse Files - MultiDrive</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,500,0,0">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@600;700;800&display=swap">
<style>
:root{
  --bg:#fbfbfb;
  --card:#ffffff;
  --text:#111111;
  --muted:#6b7280;
  --border:#111111;
  --radius:14px;
  --font-ui:"Manrope", "Segoe UI", Roboto, Arial, sans-serif;
  --font-display:"Sora", "Manrope", "Segoe UI", Roboto, Arial, sans-serif;
}

body.darkMode{
  --bg:#0a111f;
  --card:#121a2b;
  --text:#eef4ff;
  --muted:#a8b5cc;
  --border:#3a4c68;
}



*{ box-sizing:border-box; }

html,
body{
  height:100%;
  overflow:hidden;
}

body{
  margin:0;
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-ui);
}

body.darkMode{
  background:var(--bg);
}

button{
  font-family:var(--font-ui);
}

.page{
  max-width:1080px;
  margin:0 auto;
  height:100vh;
  padding:22px 16px 16px;
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
}

.topBar{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}

.topBarActions{
  display:flex;
  align-items:center;
  gap:10px;
}

.themeSwitchWrap{
  position:fixed;
  top:12px;
  right:14px;
  z-index:1300;
  display:inline-flex;
}

.themeSwitchBtn{
  width:44px;
  height:44px;
  border:2px solid var(--border);
  border-radius:12px;
  background:var(--card);
  color:var(--text);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}

.themeSwitchBtn:hover{
  background:var(--border);
  color:#fff;
}

.themeSwitchBtn:focus-visible{
  outline:2px solid #2563eb;
  outline-offset:2px;
}

.themeSwitchIcon{
  font-family:"Material Symbols Rounded";
  font-weight:normal;
  font-style:normal;
  font-size:22px;
  line-height:1;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  direction:ltr;
  display:inline-block;
  font-variation-settings:
    "FILL" 0,
    "wght" 500,
    "GRAD" 0,
    "opsz" 20;
}

@media (max-width: 640px){
  .themeSwitchWrap{
    top:8px;
    right:8px;
  }

  .themeSwitchBtn{
    width:40px;
    height:40px;
  }
}

.title{
  margin:0;
  font-size:24px;
  font-weight:900;
  letter-spacing:-0.02em;
  font-family:var(--font-display);
}

.sub{
  margin:4px 0 0;
  font-size:13px;
  color:var(--muted);
  font-weight:700;
  word-break:break-all;
}

.backBtn{
  border:2px dashed rgba(17, 17, 17, 0.726);
  background:rgba(255,255,255,0.55);
  color:var(--text);
  border-radius:9999px;
  min-height:36px;
  min-width:84px;
  padding:7px 14px;
  font-weight:900;
  font-size:12px;
  cursor:pointer;
  font-family:var(--font-display);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}

body.darkMode .backBtn{
  border-color:rgba(203,213,225,0.35);
  background:rgba(16,25,43,0.72);
  color:var(--text);
}

.backBtn:hover{
  
  background:rgba(17, 17, 17, 0.06);
}

.backBtn:active{
  background:rgba(17,17,17,0.08);
}

body.darkMode .backBtn:active{
  background:rgba(147,163,191,0.16);
}

.panel{
  border:2px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  background:var(--card);
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
}

body.darkMode .panel{
  border-color:#3a4c68;
  background:var(--card);
}

.browseNav{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
  padding:10px 16px;
  border-bottom:1px solid rgba(17,17,17,0.12);
  background:var(--card);
}

body.darkMode .browseNav{
  border-bottom-color:#2d3f5f;
  background:var(--card);
}

.browseNavBtn{
  padding:6px 10px;
  border:2px solid rgba(17,17,17,0.28);
  border-radius:10px;
  background:var(--card);
  cursor:pointer;
  font-weight:900;
  font-size:12px;
}

body.darkMode .browseNavBtn{
  border-color:#4a5f84;
  background:var(--card);
  color:var(--text);
}

.browseNavBtn:hover{
  border-style:dashed;
  

  background:var(--card);
}

.browseNavBtn.active{
  background:rgba(17,17,17,0.08);
}

body.darkMode .browseNavBtn.active{
  background:rgba(79,102,145,0.32);
}

.browseBreadcrumb{
  padding:8px 16px 12px;
  font-size:12px;
  font-weight:700;
  color:var(--muted);
  line-height:1.5;
}

.browseSearch{
  padding:10px 16px 0;
  position:relative;
  z-index:40;
}

.browseSearchRow{
  display:flex;
  gap:10px;
}

.browseSearchInputWrap{
  position:relative;
  flex:1;
  min-width:0;
}

.browseSearchLeadIcon{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  color:#64748b;
  pointer-events:none;
  font-family:"Material Symbols Rounded";
  font-weight:normal;
  font-style:normal;
  font-size:19px;
  line-height:1;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  direction:ltr;
  display:inline-block;
  font-variation-settings:
    "FILL" 0,
    "wght" 500,
    "GRAD" 0,
    "opsz" 20;
}

.browseSearchInput{
  width:100%;
  min-height:42px;
  padding:10px 34px 10px 36px;
  border:2px solid var(--border);
  border-radius:10px;
  background:var(--card);
  color:var(--text);
  font-size:14px;
  font-weight:700;
}

.browseSearchClearBtn{
  position:absolute;
  top:50%;
  right:8px;
  transform:translateY(-50%);
  width:22px;
  height:22px;
  border:1px solid #9ca3af;
  border-radius:9999px;
  background:var(--card);
  color:#6b7280;
  font-size:0;
  line-height:0;
  padding:0;
  cursor:pointer;
  display:none;
}

.browseSearchClearBtn.show{
  display:inline-flex;
  align-items:center;
  justify-content:center;
}

.browseSearchClearBtn::before{
  content:"close";
  font-family:"Material Symbols Rounded";
  font-weight:normal;
  font-style:normal;
  font-size:16px;
  line-height:1;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  direction:ltr;
  display:inline-block;
  font-variation-settings:
    "FILL" 0,
    "wght" 500,
    "GRAD" 0,
    "opsz" 20;
}

.browseSearchClearBtn:hover{
  border-color:var(--border);
  color:var(--text);
}

.browseSuggest{
  margin-top:0;
  border:2px solid var(--border);
  border-style:dashed;
  border-top:0;
  border-radius:0 0 12px 12px;
  background:rgba(255,255,255,0.52);
  overflow:hidden;
  box-shadow:0 8px 18px rgba(15,23,42,0.08);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  position:absolute;
  left:16px;
  right:16px;
  top:52px;
  z-index:50;
}

.browseSuggestItem{
  width:100%;
  text-align:left;
  padding:10px 12px;
  padding-left:40px;
  border:none;
  border-bottom:1px solid #e5e7eb;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  font-size:13px;
  font-weight:800;
  position:relative;
  display:block;
}

.browseSuggestItem::before{
  content:"search";
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  font-family:"Material Symbols Rounded";
  font-weight:normal;
  font-style:normal;
  font-size:18px;
  line-height:1;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  direction:ltr;
  display:inline-block;
  color:var(--muted);
  font-variation-settings:
    "FILL" 0,
    "wght" 500,
    "GRAD" 0,
    "opsz" 20;
}

.browseSuggestItem:last-child{
  border-bottom:none;
}

.browseSuggestItem.history::before{
  content:"history";
}

.browseSuggestItem:hover{
  background:rgba(17,17,17,0.06);
}

.browseSearchBtn{
  min-height:42px;
  padding:10px 14px;
  border:2px solid var(--border);
  border-radius:10px;
  background:var(--card);
  color:var(--text);
  font-weight:900;
  cursor:pointer;
  font-family:var(--font-display);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.browseSearchBtn::before{
  content:"search";
  font-family:"Material Symbols Rounded";
  font-weight:normal;
  font-style:normal;
  font-size:18px;
  line-height:1;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  direction:ltr;
  display:inline-block;
  font-variation-settings:
    "FILL" 0,
    "wght" 500,
    "GRAD" 0,
    "opsz" 20;
}

.browseSearchBtn:hover{
  background:var(--border);
  color:#fff;
}

body.darkMode .browseSearchInput,
body.darkMode .browseSearchClearBtn{
  background:#10182a;
}

body.darkMode .browseSearchLeadIcon{
  color:#e2e8f0;
}

body.darkMode .browseSearchInput::placeholder{
  color:#8fa1bf;
}

body.darkMode .browseSearchClearBtn{
  border-color:#4e6287;
  color:#9fb2d3;
}

body.darkMode .browseSuggest{
  background:rgba(16,24,42,0.58);
  border-color:#4a5f84;
  box-shadow:none;
}

body.darkMode .browseSuggestItem{
  border-bottom-color:#2a3a55;
}

body.darkMode .browseSuggestItem:hover{
  background:rgba(56,78,118,0.32);
}

.bcSep{
  margin:0 6px;
}

.bcPart{
  background:none;
  border:none;
  padding:0;
  cursor:pointer;
  font:inherit;
  font-weight:900;
  color:var(--text);
  text-decoration:underline;
  text-underline-offset:2px;
}

.bcCurrent{
  font-weight:900;
  color:var(--text);
}


.bodyWrap{
  position:relative;
  flex:1;
  min-height:0;
  overflow:auto;
  background:var(--card);
}

body.darkMode .bodyWrap{
  background:var(--card);
}

.dropOverlay{
  display:none;
}

.bodyWrap.dragActive::before{
  content:"";
  position:absolute;
  inset:14px;
  border:2px dashed var(--border);
  border-radius:14px;
  background:rgba(17,17,17,0.05);
  z-index:20;
  pointer-events:none;
}

.bodyWrap.dragActive::after{
  content:"Drop here to upload";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%, -50%);
  color:var(--text);
  font-weight:900;
  letter-spacing:0.01em;
  z-index:21;
  pointer-events:none;
}

.fileTable{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.fileTable th,
.fileTable td{
  padding:10px 14px;
  text-align:left;
  border-bottom:1px solid rgba(17,17,17,0.1);
  vertical-align:middle;
}

body.darkMode .fileTable th,
body.darkMode .fileTable td{
  border-bottom-color:#2a3a55;
  color:var(--text);
}

.fileTable th{
  font-weight:900;
  background:var(--card);
  position:sticky;
  top:0;
  z-index:1;
}

body.darkMode .fileTable th{
  background:var(--card);
}

.fileTable tr:hover td{
  background:rgba(17,17,17,0.03);
}

body.darkMode .fileTable tr:hover td{
  background:rgba(24,36,60,0.72);
}

.fileNameCell{
  font-weight:800;
  max-width:300px;
}

.fileNameCell a{
  color:var(--text);
  text-decoration:underline;
  text-underline-offset:2px;
}

.browseRowName{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.iconCell{
  width:18px;
  height:18px;
  flex:0 0 auto;
}

.iconCell svg{
  width:100%;
  height:100%;
}

.namePart{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.folderLink{
  border:none;
  background:none;
  padding:0;
  margin:0;
  color:var(--text);
  text-decoration:underline;
  text-underline-offset:2px;
  font:inherit;
  font-weight:900;
  cursor:pointer;
}

.folderLink:hover{
  color:var(--muted);
}

.fileMime{
  color:var(--muted);
  font-weight:700;
  max-width:160px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.fileSize{
  white-space:nowrap;
  font-weight:700;
}

.state{
  padding:24px 16px;
  text-align:center;
  font-weight:800;
  color:var(--muted);
}

.skeletonTable{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
 

.skeletonTable th,
.skeletonTable td{
  padding:10px 14px;
  text-align:left;
  border-bottom:1px solid rgba(17,17,17,0.08);
}

.skeletonTable th{
  font-size:12px;
  font-weight:900;
}

.skeletonTable th:nth-child(1),
.skeletonTable td:nth-child(1){
  width:40%;
}

.skeletonTable th:nth-child(2),
.skeletonTable td:nth-child(2){
  width:22%;
}

.skeletonTable th:nth-child(3),
.skeletonTable td:nth-child(3){
  width:13%;
}

.skeletonTable th:nth-child(4),
.skeletonTable td:nth-child(4){
  width:25%;
}

body.darkMode .skeletonTable th,
body.darkMode .skeletonTable td{
  border-bottom-color:#22324e;
}

.skeletonLine{
  display:block;
  height:11px;
  border-radius:9999px;
  background:linear-gradient(90deg, rgba(148,163,184,0.25) 0%, rgba(148,163,184,0.45) 50%, rgba(148,163,184,0.25) 100%);
  background-size:220% 100%;
  animation:skeletonShimmer 1.15s linear infinite;
}

.skeletonName{
  width:58%;
}

.skeletonType{
  width:72%;
}

.skeletonSize{
  width:56%;
}

.skeletonDate{
  width:82%;
}

@keyframes skeletonShimmer{
  0%{ background-position:200% 0; }
  100%{ background-position:-20% 0; }
}

.error{
  color:#b91c1c;
}

.emptyStateImg{
  display:block;
  width:320px;
  max-width:80%;
  height:auto;
  margin:14px auto 0;
  opacity:0.9;
}

body.darkMode .emptyStateImg{
  filter:invert(1);
}

.fileContextMenu{
  position:fixed;
  z-index:1200;
  min-width:232px;
  padding:8px;
  background:var(--card);
  border:1px solid rgba(17,17,17,0.28);
  border-radius:14px;
  overflow:hidden;
}

body.darkMode .fileContextMenu{
  background:var(--card);
  border-color:rgba(120,145,188,0.35);
}

.fileContextBtn{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  padding:9px 10px;
  border:none;
  border-radius:9px;
  background:transparent;
  text-align:left;
  font-size:13px;
  font-weight:700;
  color:#111827;
  cursor:pointer;
}

body.darkMode .fileContextBtn{
  color:var(--text);
}

.fileContextBtn + .fileContextBtn{
  margin-top:2px;
}

.fileContextBtn:hover{
  background:rgba(17,17,17,0.08);
}

body.darkMode .fileContextBtn:hover{
  background:rgba(35,50,82,0.8);
}

.fileContextBtn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.fileContextBtn:disabled:hover{
  background:transparent;
}

.ctxBtnMain{
  display:flex;
  align-items:center;
  gap:8px;
}

.ctxIcon{
  width:20px;
  text-align:center;
  font-size:20px;
  line-height:1;
  font-family:"Material Symbols Rounded";
  font-weight:normal;
  font-style:normal;
  display:inline-block;
  letter-spacing:normal;
  text-transform:none;
  white-space:nowrap;
  direction:ltr;
  font-variation-settings:
    "FILL" 0,
    "wght" 500,
    "GRAD" 0,
    "opsz" 20;
}

.ctxHint{
  font-size:11px;
  color:#6b7280;
  font-weight:700;
}

body.darkMode .ctxHint{
  color:#cbd5e1;
}

.ctxSeparator{
  height:1px;
  margin:6px 4px;
  background:rgba(255,255,255,0.34);
}

body.darkMode .ctxSeparator{
  background:rgba(203,213,225,0.3);
}

.fileContextBtn.delete{
  color:#b91c1c;
}
</style>
</head>
<body>
<div class="page">
  <div class="themeSwitchWrap">
    <button type="button" class="themeSwitchBtn" id="themeSwitchBtn" aria-label="Switch to dark mode" title="Switch to dark mode">
      <span class="themeSwitchIcon" id="themeSwitchIcon" aria-hidden="true">dark_mode</span>
    </button>
  </div>

  <div class="topBar">
    <div>
      <h1 class="title" id="browseTitle">Cloud files</h1>
      <p class="sub" id="browseEmail">Loading account…</p>
    </div>
    <div class="topBarActions">
      <button type="button" class="backBtn" onclick="window.location.href='/'">Back</button>
    </div>
  </div>

  <section class="panel">
    <div class="browseNav">
      <button type="button" class="browseNavBtn active" data-nav="my">My Drive</button>
      <button type="button" class="browseNavBtn" data-nav="shared">Shared drives</button>
    </div>
    <div class="browseSearch">
      <div class="browseSearchRow">
        <div class="browseSearchInputWrap">
          <span class="browseSearchLeadIcon" aria-hidden="true">search</span>
          <input type="text" id="browseSearchInput" class="browseSearchInput" placeholder="Search in this account">
          <button type="button" id="browseSearchClearBtn" class="browseSearchClearBtn" aria-label="Clear search" title="Clear search"></button>
        </div>
        <button type="button" id="browseSearchBtn" class="browseSearchBtn">Search</button>
      </div>
      <div id="browseSearchSuggest" class="browseSuggest" style="display:none;"></div>
    </div>
    <div class="browseBreadcrumb" id="browseBreadcrumb"></div>
    <div class="bodyWrap" id="browseBody">
      <table class="skeletonTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Size</th>
            <th>Modified</th>
          </tr>
        </thead>
        <tbody>
          <tr><td><span class="skeletonLine skeletonName"></span></td><td><span class="skeletonLine skeletonType"></span></td><td><span class="skeletonLine skeletonSize"></span></td><td><span class="skeletonLine skeletonDate"></span></td></tr>
          <tr><td><span class="skeletonLine skeletonName"></span></td><td><span class="skeletonLine skeletonType"></span></td><td><span class="skeletonLine skeletonSize"></span></td><td><span class="skeletonLine skeletonDate"></span></td></tr>
          <tr><td><span class="skeletonLine skeletonName"></span></td><td><span class="skeletonLine skeletonType"></span></td><td><span class="skeletonLine skeletonSize"></span></td><td><span class="skeletonLine skeletonDate"></span></td></tr>
          <tr><td><span class="skeletonLine skeletonName"></span></td><td><span class="skeletonLine skeletonType"></span></td><td><span class="skeletonLine skeletonSize"></span></td><td><span class="skeletonLine skeletonDate"></span></td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>

<div id="fileContextMenu" class="fileContextMenu" style="display:none;" aria-hidden="true">
  <button type="button" class="fileContextBtn" id="fileContextCutBtn">
    <span class="ctxBtnMain"><span class="ctxIcon">content_cut</span><span>Cut</span></span>
    <span class="ctxHint">Ctrl+X</span>
  </button>
  <button type="button" class="fileContextBtn" id="fileContextCopyBtn">
    <span class="ctxBtnMain"><span class="ctxIcon">content_copy</span><span>Copy</span></span>
    <span class="ctxHint">Ctrl+C</span>
  </button>
  <button type="button" class="fileContextBtn" id="fileContextPasteBtn">
    <span class="ctxBtnMain"><span class="ctxIcon">content_paste</span><span>Paste</span></span>
    <span class="ctxHint">Ctrl+V</span>
  </button>
  <div class="ctxSeparator"></div>
  <button type="button" class="fileContextBtn" id="fileContextMoveBtn">
    <span class="ctxBtnMain"><span class="ctxIcon">drive_file_move</span><span>Move to...</span></span>
    <span class="ctxHint"></span>
  </button>
  <button type="button" class="fileContextBtn delete" id="fileContextDeleteBtn">
    <span class="ctxBtnMain"><span class="ctxIcon">delete</span><span>Delete</span></span>
    <span class="ctxHint">Del</span>
  </button>
</div>

<script>
const THEME_STORAGE_KEY = "multidrive-theme"
const SEARCH_HISTORY_STORAGE_KEY = "multidrive-search-history"
const SEARCH_HISTORY_MAX = 7
const FOLDER_MIME = "application/vnd.google-apps.folder"
const queryEmail = new URLSearchParams(window.location.search).get("email") || ""
const queryProvider = new URLSearchParams(window.location.search).get("provider") || "google"
let browseEmail = queryEmail.trim()
let browseProvider = normalizeProvider(queryProvider)
let browsePath = [{ id: "root", name: "My Drive" }]
let fileContextTarget = null
let driveClipboard = null
let dragDepth = 0
let uploadInProgress = false
let browseSearchMode = false
let browseSuggestTimer = null
let browseSuggestRequestId = 0
let allowBrowseSuggestions = false

function getSearchHistory(){
  try{
    const raw = localStorage.getItem(SEARCH_HISTORY_STORAGE_KEY)
    const parsed = JSON.parse(raw || "[]")
    if(!Array.isArray(parsed)) return []
    return parsed.map(item => String(item || "").trim()).filter(Boolean).slice(0, SEARCH_HISTORY_MAX)
  }catch(e){
    return []
  }
}

function saveSearchHistoryTerm(term){
  const value = String(term || "").trim()
  if(!value) return
  const next = [value, ...getSearchHistory().filter(item => item.toLowerCase() !== value.toLowerCase())].slice(0, SEARCH_HISTORY_MAX)
  localStorage.setItem(SEARCH_HISTORY_STORAGE_KEY, JSON.stringify(next))
}

function normalizeProvider(provider){
  return String(provider || "google").trim().toLowerCase() === "mega" ? "mega" : "google"
}

function providerName(provider){
  return normalizeProvider(provider) === "mega" ? "MEGA" : "Google Drive"
}


function applyTheme(theme){
  const useDark = theme === "dark"
  document.body.classList.toggle("darkMode", useDark)
  const btn = document.getElementById("themeSwitchBtn")
  const icon = document.getElementById("themeSwitchIcon")
  if(btn && icon){
    if(useDark){
      icon.textContent = "light_mode"
      btn.setAttribute("aria-label", "Switch to light mode")
      btn.setAttribute("title", "Switch to light mode")
    }else{
      icon.textContent = "dark_mode"
      btn.setAttribute("aria-label", "Switch to dark mode")
      btn.setAttribute("title", "Switch to dark mode")
    }
  }
}

function escapeHtml(s){
  const d = document.createElement("div")
  d.textContent = s
  return d.innerHTML
}

function formatFileSize(bytes){
  if(bytes == null || bytes === "") return "—"
  const n = Number(bytes)
  if(!Number.isFinite(n) || n < 0) return "—"
  const units = ["B", "KB", "MB", "GB", "TB"]
  let v = n
  let i = 0
  while(v >= 1024 && i < units.length - 1){
    v /= 1024
    i++
  }
  return (i === 0 ? Math.round(v) : v.toFixed(i >= 3 ? 2 : 1)) + " " + units[i]
}

function renderBrowseSkeleton(rowCount){
  const count = Math.max(4, Number(rowCount) || 8)
  const rows = Array.from({ length: count }).map(() => {
    return "<tr><td><span class=\"skeletonLine skeletonName\"></span></td><td><span class=\"skeletonLine skeletonType\"></span></td><td><span class=\"skeletonLine skeletonSize\"></span></td><td><span class=\"skeletonLine skeletonDate\"></span></td></tr>"
  }).join("")

  return "<table class=\"skeletonTable\"><thead><tr><th>Name</th><th>Type</th><th>Size</th><th>Modified</th></tr></thead><tbody>" + rows + "</tbody></table>"
}

function updateBrowseSearchClearButton(){
  const input = document.getElementById("browseSearchInput")
  const clearBtn = document.getElementById("browseSearchClearBtn")
  if(!input || !clearBtn) return
  if(input.value.trim()){
    clearBtn.classList.add("show")
  }else{
    clearBtn.classList.remove("show")
  }
}

function hideBrowseSuggestions(){
  const box = document.getElementById("browseSearchSuggest")
  if(!box) return
  box.style.display = "none"
  box.innerHTML = ""
}

function renderBrowseSuggestions(items){
  const box = document.getElementById("browseSearchSuggest")
  if(!box) return
  if(!Array.isArray(items) || items.length === 0){
    hideBrowseSuggestions()
    return
  }

  box.innerHTML = items.map(item => {
    const name = item && item.name ? String(item.name) : ""
    const cls = item && item.kind === "history" ? "browseSuggestItem history" : "browseSuggestItem"
    return '<button type="button" class="' + cls + '" data-suggest="' + encodeURIComponent(name) + '">' + escapeHtml(name) + "</button>"
  }).join("")
  box.style.display = "block"

  box.querySelectorAll(".browseSuggestItem").forEach(btn => {
    btn.addEventListener("click", function(){
      const input = document.getElementById("browseSearchInput")
      const raw = btn.getAttribute("data-suggest") || ""
      if(!input) return
      let value = ""
      try{
        value = decodeURIComponent(raw)
      }catch(e){
        value = raw
      }
      input.value = value
      updateBrowseSearchClearButton()
      hideBrowseSuggestions()
      searchInOpenedAccount()
    })
  })
}

async function fetchBrowseSuggestions(){
  const input = document.getElementById("browseSearchInput")
  if(!input || !browseEmail) return
  if(!allowBrowseSuggestions || document.activeElement !== input){
    hideBrowseSuggestions()
    return
  }
  const term = input.value.trim()
  updateBrowseSearchClearButton()

  if(!term){
    const history = getSearchHistory().slice(0, 4).map(name => ({ name, kind:"history" }))
    renderBrowseSuggestions(history)
    return
  }

  if(term.length < 2){
    hideBrowseSuggestions()
    return
  }

  const reqId = ++browseSuggestRequestId
  try{
    const res = await fetch("/search?q=" + encodeURIComponent(term))
    const payload = await res.json()
    if(reqId !== browseSuggestRequestId) return
    if(!res.ok){
      hideBrowseSuggestions()
      return
    }

    const all = Array.isArray(payload.results) ? payload.results : []
    const history = getSearchHistory().filter(name => name.toLowerCase().includes(term.toLowerCase()))
    const names = []
    const seen = new Set()

    for(const name of history){
      const key = name.toLowerCase()
      if(seen.has(key)) continue
      seen.add(key)
      names.push({ name, kind:"history" })
      if(names.length >= 8) break
    }

    for(const item of all){
      const itemEmail = String(item && item.accountEmail || "").trim().toLowerCase()
      const itemProvider = normalizeProvider(item && item.accountProvider || "google")
      if(itemEmail !== browseEmail.trim().toLowerCase() || itemProvider !== browseProvider){
        continue
      }
      const name = item && item.name ? String(item.name).trim() : ""
      if(!name) continue
      const key = name.toLowerCase()
      if(seen.has(key)) continue
      seen.add(key)
      names.push({ name, kind:"search" })
      if(names.length >= 8) break
    }

    renderBrowseSuggestions(names)
  }catch(e){
    if(reqId !== browseSuggestRequestId) return
    hideBrowseSuggestions()
  }
}

function queueBrowseSuggestions(){
  if(browseSuggestTimer){
    clearTimeout(browseSuggestTimer)
  }
  browseSuggestTimer = setTimeout(fetchBrowseSuggestions, 220)
}

function goToMyDriveRoot(){
  browseSearchMode = false
  const bc = document.getElementById("browseBreadcrumb")
  if(bc) bc.style.display = ""
  browsePath = [{ id: "root", name: "My Drive"}]
  loadBrowseFolder()

}

function goToSharedDrivesList(){
  browseSearchMode = false
  const bc = document.getElementById("browseBreadcrumb")
  if(bc) bc.style.display = ""
  browsePath = [{ id: "__shared_drives__", name: "Shared drives" }]
  loadBrowseFolder()
}

function openBrowseFolder(id, name){
  browseSearchMode = false
  const bc = document.getElementById("browseBreadcrumb")
  if(bc) bc.style.display = ""
  browsePath.push({ id, name: name || "(folder)" })
  loadBrowseFolder()
}

function renderBrowseBreadcrumb(){
  const el = document.getElementById("browseBreadcrumb")
  if(!el) return

  const html = browsePath.map((seg, i) => {
    const isLast = i === browsePath.length - 1
    const label = escapeHtml(seg.name)
    if(isLast){
      return '<span class="bcCurrent">' + label + "</span>"
    }
    return '<button type="button" class="bcPart" data-bcidx="' + i + '">' + label + "</button>"
  }).join('<span class="bcSep">›</span>')

  el.innerHTML = html

  el.querySelectorAll(".bcPart").forEach(btn => {
    btn.addEventListener("click", function(){
      const idx = parseInt(btn.getAttribute("data-bcidx"), 10)
      if(Number.isNaN(idx)) return
      browsePath = browsePath.slice(0, idx + 1)
      loadBrowseFolder()
    })
  })
}


function closeFileContextMenu(){
  const menu = document.getElementById("fileContextMenu")
  if(!menu) return
  menu.style.display = "none"
  menu.setAttribute("aria-hidden", "true")
  fileContextTarget = null
}

function openFileContextMenu(x, y, item){
  const menu = document.getElementById("fileContextMenu")
  if(!menu) return
  fileContextTarget = item
  updateFileContextButtonsState()
  menu.style.display = "block"
  menu.setAttribute("aria-hidden", "false")
  const maxLeft = window.innerWidth - menu.offsetWidth - 8
  const maxTop = window.innerHeight - menu.offsetHeight - 8
  menu.style.left = Math.max(8, Math.min(x, maxLeft)) + "px"
  menu.style.top = Math.max(8, Math.min(y, maxTop)) + "px"
}

function getCurrentBrowseFolderId(){
  const current = browsePath[browsePath.length - 1]
  if(!current || !current.id || current.id === "__shared_drives__"){
    return ""
  }
  return current.id
}

function updateFileContextButtonsState(){
  const pasteBtn = document.getElementById("fileContextPasteBtn")
  const moveBtn = document.getElementById("fileContextMoveBtn")
  const deleteBtn = document.getElementById("fileContextDeleteBtn")
  const hasTarget = !!(fileContextTarget && fileContextTarget.id)
  const hasClipboard = !!(driveClipboard && driveClipboard.id)

  if(pasteBtn){
    pasteBtn.disabled = !hasClipboard || !getCurrentBrowseFolderId()
  }
  if(moveBtn){
    moveBtn.disabled = !hasTarget
  }
  if(deleteBtn){
    deleteBtn.disabled = !hasTarget
  }
}


function stashClipboard(mode){
  if(!fileContextTarget || !fileContextTarget.id){
    closeFileContextMenu()
    return
  }
  driveClipboard = {
    mode,
    id: fileContextTarget.id,
    name: fileContextTarget.name || "(unnamed)"
  }
  closeFileContextMenu()
}

function cutBrowseItemFromContext(){
  stashClipboard("cut")
}

function copyBrowseItemFromContext(){
  stashClipboard("copy")
}

async function pasteBrowseItemFromContext(){
  if(!driveClipboard || !driveClipboard.id){
    closeFileContextMenu()
    return
  }
  const destinationFolderId = getCurrentBrowseFolderId()
  if(!destinationFolderId){
    alert("Open a destination folder first, then paste.")
    closeFileContextMenu()
    return
  }
  closeFileContextMenu()
  const endpoint = driveClipboard.mode === "cut" ? "/move-item" : "/copy-item"
  try{
    const res = await fetch(endpoint, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email: browseEmail, provider: browseProvider, fileId: driveClipboard.id, destinationFolderId })
    })
    const payload = await res.json()
    if(!res.ok){
      alert(payload && payload.error ? payload.error : "Unable to complete paste")
      return
    }
    if(driveClipboard.mode === "cut"){
      driveClipboard = null
    }
    loadBrowseFolder()
  }catch(e){
    alert("Paste failed. Please try again.")
  }
}

async function moveBrowseItemFromContext(){
  if(!fileContextTarget || !fileContextTarget.id){
    closeFileContextMenu()
    return
  }
  const destinationFolderId = (window.prompt("Enter destination folder ID:", "") || "").trim()
  if(!destinationFolderId){
    closeFileContextMenu()
    return
  }
  if(destinationFolderId === fileContextTarget.id){
    alert("Destination folder ID cannot be same as selected item ID.")
    closeFileContextMenu()
    return
  }
  closeFileContextMenu()

  try{
    const res = await fetch("/move-item", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email: browseEmail, provider: browseProvider, fileId: fileContextTarget.id, destinationFolderId })
    })
    const payload = await res.json()
    if(!res.ok){
      alert(payload && payload.error ? payload.error : "Unable to move item")
      return
    }
    loadBrowseFolder()
  }catch(e){
    alert("Move failed. Please try again.")
  }
}

async function deleteBrowseItemFromContext(){
  if(!fileContextTarget) return
  const fileId = fileContextTarget.id
  const itemName = fileContextTarget.name || "this item"
  if(!browseEmail || !fileId){
    closeFileContextMenu()
    return
  }
  if(!window.confirm('Delete "' + itemName + '"? This cannot be undone.')){
    closeFileContextMenu()
    return
  }
  closeFileContextMenu()
  try{
    const res = await fetch("/delete-item", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email: browseEmail, provider: browseProvider, fileId })
    })
    const payload = await res.json()
    if(!res.ok){
      alert(payload && payload.error ? payload.error : "Unable to delete item")
      return
    }
    loadBrowseFolder()
  }catch(e){
    alert("Delete failed. Please try again.")
  }
}

function renderBrowseRows(items){
  const folderIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#f59e0b" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>'
  const fileIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#64748b" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>'

  return items.map(f => {
    const name = f.name || "(unnamed)"
    const mime = f.mimeType ? String(f.mimeType) : ""
    const isFolder = mime === FOLDER_MIME
    const isSharedRoot = !!f.isSharedDriveRoot
    const link = f.webViewLink ? String(f.webViewLink) : ""
    const fileId = String(f.id || "")
    const openUrl = link || (fileId ? ("/open-file?email=" + encodeURIComponent(browseEmail) + "&provider=" + encodeURIComponent(browseProvider) + "&fileId=" + encodeURIComponent(fileId)) : "")
    const typeLabel = isFolder ? "Folder" : (mime ? mime.split("/").pop() : "—")
    const mod = f.modifiedTime ? new Date(f.modifiedTime).toLocaleString() : "—"
    const size = isFolder ? "—" : formatFileSize(f.size)
    const iconHtml = '<span class="iconCell">' + (isFolder ? folderIcon : fileIcon) + "</span>"
    let innerName
    if(isFolder && !browseSearchMode){
      innerName = '<button type="button" class="folderLink" data-folder-id="' + escapeHtml(f.id) + '" data-folder-name="' + encodeURIComponent(name) + '">' + escapeHtml(name) + "</button>"
    }else if(openUrl){
      innerName = '<a href="' + escapeHtml(openUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(name) + "</a>"
    }else{
      innerName = escapeHtml(name)
    }
    const nameCell = '<div class="browseRowName">' + iconHtml + '<span class="namePart">' + innerName + "</span></div>"
    return "<tr class=\"browseItemRow\" data-item-id=\"" + escapeHtml(String(f.id || "")) + "\" data-item-name=\"" + encodeURIComponent(name) + "\" data-shared-root=\"" + (isSharedRoot ? "1" : "0") + "\"><td class=\"fileNameCell\">" + nameCell + "</td><td class=\"fileMime\" title=\"" + escapeHtml(mime || "—") + "\">" + escapeHtml(typeLabel) + "</td><td class=\"fileSize\">" + escapeHtml(size) + "</td><td>" + escapeHtml(mod) + "</td></tr>"
  }).join("")
}

function renderBrowseTable(items){
  const body = document.getElementById("browseBody")
  if(!body) return
  body.innerHTML = '<table class="fileTable"><thead><tr><th>Name</th><th>Type</th><th>Size</th><th>Modified</th></tr></thead><tbody>' + renderBrowseRows(items) + "</tbody></table>"

  body.querySelectorAll(".folderLink").forEach(btn => {
    btn.addEventListener("click", function(){
      const fid = btn.getAttribute("data-folder-id")
      let fname = btn.getAttribute("data-folder-name") || ""
      try{ fname = decodeURIComponent(fname) }catch(e){}
      openBrowseFolder(fid, fname)
    })
  })

  body.querySelectorAll(".browseItemRow").forEach(row => {
    row.addEventListener("contextmenu", function(ev){
      ev.preventDefault()
      const fileId = row.getAttribute("data-item-id") || ""
      const isSharedRoot = row.getAttribute("data-shared-root") === "1"
      if(!fileId || isSharedRoot){
        closeFileContextMenu()
        return
      }
      let name = "(unnamed)"
      try{ name = decodeURIComponent(row.getAttribute("data-item-name") || "") || "(unnamed)" }catch(e){}
      openFileContextMenu(ev.clientX, ev.clientY, { id: fileId, name })
    })
  })
}

async function searchInOpenedAccount(){
  const input = document.getElementById("browseSearchInput")
  const body = document.getElementById("browseBody")
  const bc = document.getElementById("browseBreadcrumb")
  const btn = document.getElementById("browseSearchBtn")
  if(!input || !body || !bc || !btn) return

  const term = input.value.trim()
  updateBrowseSearchClearButton()
  hideBrowseSuggestions()
  allowBrowseSuggestions = false
  browseSuggestRequestId += 1
  if(browseSuggestTimer){
    clearTimeout(browseSuggestTimer)
    browseSuggestTimer = null
  }
  input.blur()

  if(!term){
    browseSearchMode = false
    bc.style.display = ""
    loadBrowseFolder()
    return
  }
  saveSearchHistoryTerm(term)

  browseSearchMode = true
  bc.style.display = "none"
  closeFileContextMenu()
  btn.disabled = true
  body.innerHTML = renderBrowseSkeleton(8)

  try{
    const res = await fetch("/search?q=" + encodeURIComponent(term))
    const payload = await res.json()
    if(!res.ok){
      const err = payload && payload.error ? payload.error : "Could not search files"
      body.innerHTML = '<div class="state error">' + escapeHtml(String(err)) + "</div>"
      return
    }

    const all = Array.isArray(payload.results) ? payload.results : []
    const filtered = all.filter(item => {
      const itemEmail = String(item && item.accountEmail || "").trim().toLowerCase()
      const itemProvider = normalizeProvider(item && item.accountProvider || "google")
      return itemEmail === browseEmail.trim().toLowerCase() && itemProvider === browseProvider
    })

    if(filtered.length === 0){
      body.innerHTML = '<div class="state">No files or folders matched in this account.</div>'
      return
    }

    renderBrowseTable(filtered)
  }catch(e){
    body.innerHTML = '<div class="state error">Failed to search right now.</div>'
  }finally{
    btn.disabled = false
  }
}

async function loadBrowseFolder(){
  const body = document.getElementById("browseBody")
  const emailEl = document.getElementById("browseEmail")
  if(!body || !browseEmail) return

  if(emailEl) emailEl.textContent = browseEmail
  const titleEl = document.getElementById("browseTitle")
  if(titleEl) titleEl.textContent = providerName(browseProvider) + " files"
  body.innerHTML = renderBrowseSkeleton(8)
  closeFileContextMenu()

  const parentSeg = browsePath[browsePath.length - 1]
  const parentId = parentSeg ? parentSeg.id : "root"

  try{
    const url = "/files?email=" + encodeURIComponent(browseEmail) + "&provider=" + encodeURIComponent(browseProvider) + "&parentId=" + encodeURIComponent(parentId)
    const res = await fetch(url)
    const payload = await res.json()

    if(!res.ok){
      const err = payload && payload.error ? payload.error : "Could not load folder"
      body.innerHTML = '<div class="state error">' + escapeHtml(String(err)) + "</div>"
      return
    }

    const items = Array.isArray(payload.items) ? payload.items : []
    const inMyDriveBranch = browsePath.length > 0 && browsePath[0].id === "root"
    const navWrap = document.querySelector(".browseNav")
    if(navWrap){
      navWrap.style.display = normalizeProvider(browseProvider) === "mega" ? "none" : ""
    }
    document.querySelectorAll(".browseNavBtn[data-nav]").forEach(btn => {
      const nav = btn.getAttribute("data-nav")
      const active = (nav === "my" && inMyDriveBranch) || (nav === "shared" && !inMyDriveBranch)
      btn.classList.toggle("active", active)
    })
    renderBrowseBreadcrumb()

    if(items.length === 0){
      const emptyHint = parentId === "root" && normalizeProvider(browseProvider) !== "mega"
        ? "<p style=\"margin:8px 0 0;font-size:12px;font-weight:700;color:var(--muted);max-width:420px;margin-left:auto;margin-right:auto;\">If your files live on a team or shared drive, open <strong>Shared drives</strong> above.</p>"
        : ""
      body.innerHTML = '<div class="state">No folders or files here.' + emptyHint + '<img class="emptyStateImg" src="/images/nothing_here__.png" alt="Nothing here"></div>'
      return
    }

    const folderIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#f59e0b" d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>'
    const fileIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#64748b" d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>'

    const rows = items.map(f => {
      const name = f.name || "(unnamed)"
      const mime = f.mimeType ? String(f.mimeType) : ""
      const isFolder = mime === FOLDER_MIME
      const isSharedRoot = !!f.isSharedDriveRoot
      const link = f.webViewLink ? String(f.webViewLink) : ""
      const fileId = String(f.id || "")
      const openUrl = link || (fileId ? ("/open-file?email=" + encodeURIComponent(browseEmail) + "&provider=" + encodeURIComponent(browseProvider) + "&fileId=" + encodeURIComponent(fileId)) : "")
      const typeLabel = isFolder ? "Folder" : (mime ? mime.split("/").pop() : "—")
      const mod = f.modifiedTime ? new Date(f.modifiedTime).toLocaleString() : "—"
      const size = isFolder ? "—" : formatFileSize(f.size)
      const iconHtml = '<span class="iconCell">' + (isFolder ? folderIcon : fileIcon) + "</span>"
      let innerName
      if(isFolder){
        innerName = '<button type="button" class="folderLink" data-folder-id="' + escapeHtml(f.id) + '" data-folder-name="' + encodeURIComponent(name) + '">' + escapeHtml(name) + "</button>"
      }else if(openUrl){
        innerName = '<a href="' + escapeHtml(openUrl) + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(name) + "</a>"
      }else{
        innerName = escapeHtml(name)
      }
      const nameCell = '<div class="browseRowName">' + iconHtml + '<span class="namePart">' + innerName + "</span></div>"
      return "<tr class=\"browseItemRow\" data-item-id=\"" + escapeHtml(String(f.id || "")) + "\" data-item-name=\"" + encodeURIComponent(name) + "\" data-shared-root=\"" + (isSharedRoot ? "1" : "0") + "\"><td class=\"fileNameCell\">" + nameCell + "</td><td class=\"fileMime\" title=\"" + escapeHtml(mime || "—") + "\">" + escapeHtml(typeLabel) + "</td><td class=\"fileSize\">" + escapeHtml(size) + "</td><td>" + escapeHtml(mod) + "</td></tr>"
    }).join("")

    body.innerHTML = '<table class="fileTable"><thead><tr><th>Name</th><th>Type</th><th>Size</th><th>Modified</th></tr></thead><tbody>' + rows + "</tbody></table>"

    body.querySelectorAll(".folderLink").forEach(btn => {
      btn.addEventListener("click", function(){
        const fid = btn.getAttribute("data-folder-id")
        let fname = btn.getAttribute("data-folder-name") || ""
        try{ fname = decodeURIComponent(fname) }catch(e){}
        openBrowseFolder(fid, fname)
      })
    })

    body.querySelectorAll(".browseItemRow").forEach(row => {
      row.addEventListener("contextmenu", function(ev){
        ev.preventDefault()
        const fileId = row.getAttribute("data-item-id") || ""
        const isSharedRoot = row.getAttribute("data-shared-root") === "1"
        if(!fileId || isSharedRoot){
          closeFileContextMenu()
          return
        }
        let name = "(unnamed)"
        try{ name = decodeURIComponent(row.getAttribute("data-item-name") || "") || "(unnamed)" }catch(e){}
        openFileContextMenu(ev.clientX, ev.clientY, { id: fileId, name })
      })
    })

  }catch(e){
    body.innerHTML = '<div class="state error">Failed to load folder.</div>'
  }
}

function hasDraggedFiles(ev){
  if(!ev || !ev.dataTransfer || !ev.dataTransfer.types) return false
  return Array.from(ev.dataTransfer.types).includes("Files")
}

function setDropOverlay(active){
  const body = document.getElementById("browseBody")
  if(!body) return
  body.classList.toggle("dragActive", active)
}

function currentDropParentId(){
  const current = browsePath[browsePath.length - 1]
  if(!current || !current.id || current.id === "__shared_drives__"){
    return ""
  }
  return current.id
}

async function uploadDroppedFiles(fileList){
  const files = Array.from(fileList || [])
  if(files.length === 0 || uploadInProgress) return
  if(!browseEmail){
    alert("Missing account email for upload.")
    return
  }
  const parentId = currentDropParentId()
  if(!parentId){
    alert("Open a destination folder, then drop files.")
    return
  }

  uploadInProgress = true
  const body = document.getElementById("browseBody")
  if(body){
    body.innerHTML = '<div class="state">Uploading ' + String(files.length) + ' file(s)…</div>'
  }

  try{
    for(const file of files){
      const form = new FormData()
      form.append("email", browseEmail)
      form.append("provider", browseProvider)
      form.append("parentId", parentId)
      form.append("file", file, file.name)

      const res = await fetch("/upload-item", {
        method:"POST",
        body: form
      })
      const payload = await res.json()
      if(!res.ok){
        const msg = payload && payload.error ? payload.error : "Upload failed"
        throw new Error(msg)
      }
    }
    await loadBrowseFolder()
  }catch(err){
    alert(err && err.message ? err.message : "Upload failed. Please try again.")
    await loadBrowseFolder()
  }finally{
    uploadInProgress = false
  }
}

window.addEventListener("dragenter", function(ev){
  if(!hasDraggedFiles(ev)) return
  ev.preventDefault()
  dragDepth += 1
  setDropOverlay(true)
})

window.addEventListener("dragover", function(ev){
  if(!hasDraggedFiles(ev)) return
  ev.preventDefault()
  if(ev.dataTransfer){
    ev.dataTransfer.dropEffect = "copy"
  }
  setDropOverlay(true)
})

window.addEventListener("dragleave", function(ev){
  if(!hasDraggedFiles(ev)) return
  ev.preventDefault()
  dragDepth = Math.max(0, dragDepth - 1)
  if(dragDepth === 0){
    setDropOverlay(false)
  }
})

window.addEventListener("drop", function(ev){
  if(!hasDraggedFiles(ev)) return
  ev.preventDefault()
  dragDepth = 0
  setDropOverlay(false)
  uploadDroppedFiles(ev.dataTransfer ? ev.dataTransfer.files : [])
})

document.querySelectorAll(".browseNavBtn[data-nav]").forEach(btn => {
  btn.addEventListener("click", function(){
    const nav = btn.getAttribute("data-nav")
    if(nav === "my"){
      goToMyDriveRoot()
    }else if(nav === "shared"){
      goToSharedDrivesList()
    }
  })
})

document.addEventListener("click", function(ev){
  const menu = document.getElementById("fileContextMenu")
  if(!menu) return
  if(menu.style.display !== "none" && !menu.contains(ev.target)){
    closeFileContextMenu()
  }
})

document.addEventListener("keydown", function(ev){
  if(ev.key === "Escape"){
    closeFileContextMenu()
  }
})

document.getElementById("fileContextCutBtn").addEventListener("click", cutBrowseItemFromContext)
document.getElementById("fileContextCopyBtn").addEventListener("click", copyBrowseItemFromContext)
document.getElementById("fileContextPasteBtn").addEventListener("click", pasteBrowseItemFromContext)
document.getElementById("fileContextMoveBtn").addEventListener("click", moveBrowseItemFromContext)
document.getElementById("fileContextDeleteBtn").addEventListener("click", deleteBrowseItemFromContext)
document.getElementById("browseSearchBtn").addEventListener("click", searchInOpenedAccount)
document.getElementById("browseSearchInput").addEventListener("keydown", function(ev){
  if(ev.key === "Enter"){
    ev.preventDefault()
    searchInOpenedAccount()
  }
})
document.getElementById("browseSearchInput").addEventListener("input", function(){
  allowBrowseSuggestions = true
  queueBrowseSuggestions()
})
document.getElementById("browseSearchInput").addEventListener("focus", function(){
  allowBrowseSuggestions = true
  queueBrowseSuggestions()
})
document.getElementById("browseSearchClearBtn").addEventListener("click", function(){
  const input = document.getElementById("browseSearchInput")
  const bc = document.getElementById("browseBreadcrumb")
  if(!input) return
  input.value = ""
  hideBrowseSuggestions()
  allowBrowseSuggestions = false
  updateBrowseSearchClearButton()
  browseSearchMode = false
  if(bc) bc.style.display = ""
  loadBrowseFolder()
  input.focus()
})
document.addEventListener("click", function(ev){
  const wrap = document.querySelector(".browseSearch")
  if(!wrap) return
  if(!wrap.contains(ev.target)){
    hideBrowseSuggestions()
  }
})
document.getElementById("browseBody").addEventListener("click", function(){
  hideBrowseSuggestions()
  allowBrowseSuggestions = false
})
document.getElementById("themeSwitchBtn").addEventListener("click", function(){
  const next = document.body.classList.contains("darkMode") ? "light" : "dark"
  localStorage.setItem(THEME_STORAGE_KEY, next)
  applyTheme(next)
})
const savedTheme = localStorage.getItem(THEME_STORAGE_KEY)
applyTheme(savedTheme === "dark" ? "dark" : "light")

if(!browseEmail){
  document.getElementById("browseEmail").textContent = "No account selected"
  document.getElementById("browseBody").innerHTML = '<div class="state error">Missing account email. Go back and click Browse on an account card.</div>'
}else{
  loadBrowseFolder()
}
</script>
</body>
</html>
