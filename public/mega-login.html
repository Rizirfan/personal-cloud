<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEGA Login - MultiDrive</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,500,0,0">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@600;700;800&display=swap">
  <style>
    :root {
      --bg: #f6f8ff;
      --card: #ffffff;
      --muted: #5f6b82;
      --text: #111111;
      --accent: #22c55e;
      --border: #111111;
      --danger: #ef4444;
      --font-ui: "Manrope", "Segoe UI", Roboto, Arial, sans-serif;
      --font-display: "Sora", "Manrope", "Segoe UI", Roboto, Arial, sans-serif;
      --input-bg: #ffffff;
      --secondary-bg: #f3f4f6;
      --secondary-border: rgba(17, 17, 17, 0.28);
    }

    body.darkMode {
      --bg: #0a111f;
      --card: #121a2b;
      --muted: #a8b5cc;
      --text: #eef4ff;
      --border: #3a4c68;
      --input-bg: #10182a;
      --secondary-bg: #1d2941;
      --secondary-border: #4a5f84;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 0%, #eef2ff 0%, #f8fafc 55%, #eef2ff 100%);
      color: var(--text);
      font-family: var(--font-ui);
      padding: 20px;
    }

    body.darkMode {
      background: radial-gradient(circle at 20% 0%, #18243d 0%, #0a111f 52%, #070d18 100%);
    }

    .themeSwitchWrap {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 1300;
      display: inline-flex;
    }

    .themeSwitchBtn {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .themeSwitchBtn:hover {
      background: var(--border);
      color: #fff;
    }

    .themeSwitchBtn:focus-visible {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

    .themeSwitchIcon {
      font-family: "Material Symbols Rounded";
      font-weight: normal;
      font-style: normal;
      font-size: 22px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      white-space: nowrap;
      direction: ltr;
      display: inline-block;
      font-variation-settings:
        "FILL" 0,
        "wght" 500,
        "GRAD" 0,
        "opsz" 20;
    }

    @media (max-width: 640px) {
      .themeSwitchWrap {
        top: 8px;
        right: 8px;
      }

      .themeSwitchBtn {
        width: 40px;
        height: 40px;
      }
    }

    .card {
      width: min(460px, 100%);
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.12);
      position: relative;
      z-index: 1;
    }

    body.darkMode .card {
      background: linear-gradient(145deg, rgba(16, 24, 43, 0.9), rgba(14, 21, 37, 0.86));
      box-shadow: 0 20px 36px rgba(2, 6, 23, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 900;
      font-family: var(--font-display);
    }

    .sub {

      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .error {
      margin: 0 0 12px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fecaca;
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      font-weight: 700;
      display: none;
    }

    label {
      display: block;
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 800;
    }

    input {
      width: 100%;
      margin: 0 0 12px;
      background: var(--input-bg);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: var(--font-ui);
    }

    input::placeholder {
      color: #8fa1bf;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }


    button {
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 900;
      padding: 10px 14px;
      font-size: 13px;
      font-family: var(--font-display);
    }

    .primary {
      background: var(--accent);
      color: #052e16;
    }

    .secondary {
      background: var(--secondary-bg);
      color: var(--text);
      border: 2px solid var(--secondary-border);
    }

    .token {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="themeSwitchWrap">
    <button type="button" class="themeSwitchBtn" id="themeSwitchBtn" aria-label="Switch to dark mode" title="Switch to dark mode">
      <span class="themeSwitchIcon" id="themeSwitchIcon" aria-hidden="true">dark_mode</span>
    </button>
  </div>
  <main class="card">
    <h1>Sign in to MEGA</h1>
    <p class="sub">Use your MEGA credentials to connect this account to MultiDrive.</p>
    <p id="errorBox" class="error"></p>

    <form method="POST" action="/auth/mega/login">
      <label for="email">MEGA Email</label>
      <input id="email" name="email" type="email" required autocomplete="username">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">

      <label for="secondFactorCode">2FA Code (optional)</label>
      <input id="secondFactorCode" name="secondFactorCode" type="text" inputmode="numeric" autocomplete="one-time-code"
        placeholder="If enabled on your MEGA account">

      <div class="actions">
        <button type="submit" class="primary">Connect MEGA</button>
        <button type="button" class="secondary" onclick="window.location.href='/'">Back</button>
      </div>
    </form>

    <div class="token">
      Already using a session token from <code>MEGA_SESSION_TOKEN</code>? You can still use it:
      <form method="POST" action="/auth/mega/token" style="margin-top:8px;">
        <button type="submit" class="secondary">Connect Using Saved Token</button>
      </form>
    </div>
  </main>

  <script>
    const THEME_STORAGE_KEY = "multidrive-theme"

    function applyTheme(theme) {
      const useDark = theme === "dark"
      document.body.classList.toggle("darkMode", useDark)
      const btn = document.getElementById("themeSwitchBtn")
      const icon = document.getElementById("themeSwitchIcon")
      if (btn && icon) {
        if (useDark) {
          icon.textContent = "light_mode"
          btn.setAttribute("aria-label", "Switch to light mode")
          btn.setAttribute("title", "Switch to light mode")
        } else {
          icon.textContent = "dark_mode"
          btn.setAttribute("aria-label", "Switch to dark mode")
          btn.setAttribute("title", "Switch to dark mode")
        }
      }
    }

    const params = new URLSearchParams(window.location.search)
    const error = params.get("error")
    if (error) {
      const box = document.getElementById("errorBox")
      box.textContent = error
      box.style.display = "block"
    }

    document.getElementById("themeSwitchBtn").addEventListener("click", function () {
      const next = document.body.classList.contains("darkMode") ? "light" : "dark"
      localStorage.setItem(THEME_STORAGE_KEY, next)
      applyTheme(next)
    })

    const savedTheme = localStorage.getItem(THEME_STORAGE_KEY)
    applyTheme(savedTheme === "dark" ? "dark" : "light")
  </script>

</body>

</html>
